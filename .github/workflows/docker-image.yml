name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: docker login
      uses: docker/login-action@v3
      with:
           username: ${{ secrets.DOCKER_USER }}
           password: ${{ secrets.DOCKER_PASSWORD }}
           
    - name: Build the Docker image
      run: docker build -t 2005avi/myweb:v2 .
    - name: docker push  
      run: docker push 2005avi/myweb:v2

    

    - name: docker run
      run: docker run -d -p 80:80 --name webcontainer 2005avi/myweb:v2
        
      
