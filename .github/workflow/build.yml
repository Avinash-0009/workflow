name: Build Website

on:
  push:
      branches:
	      - main
	

jobs:
    build:
         runs-on: ubuntu-latest
         
	 steps:
	      - name: checkout
 	        uses: actions/checkout@v4 

	      - name: docker login
	        uses: docker/login-action@v3
	        with:
		    username: ${{ secrets.DOCKER_USER }}
		    password: ${{ secrets.DOCKER_PASSWORD }}
	     
	      - name: docker build
		run: docker build -t 2005avi/myweb:v2

              - name: Push Docker Image
                run: docker push 2005avi/myweb:2
